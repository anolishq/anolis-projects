name: Bundle Release

on:
  push:
    tags:
      - '*-[0-9]*'  # matches bioreactor-v1-0.3.0, mixed-bus-dev-1.0.0, etc.

permissions:
  contents: write

jobs:
  bundle:
    name: Bundle (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: ubuntu-24.04-arm
          - arch: x86_64
            runner: ubuntu-24.04

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Parse tag
        id: tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Tag format: {profile}-{version} — last segment after final hyphen-digit is version
          # e.g. bioreactor-v1-0.3.0 → profile=bioreactor-v1, version=0.3.0
          VERSION=$(echo "${TAG}" | grep -oP '[0-9]+\.[0-9]+\.[0-9]+$')
          PROFILE="${TAG%-${VERSION}}"
          if [ -z "${VERSION}" ] || [ -z "${PROFILE}" ]; then
            echo "ERROR: Could not parse tag '${TAG}' into profile + version" >&2
            echo "Expected format: {profile}-{semver} e.g. bioreactor-v1-0.3.0" >&2
            exit 1
          fi
          echo "profile=${PROFILE}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Parsed tag: profile=${PROFILE}, version=${VERSION}"

      - name: Validate profile directory
        run: |
          PROFILE="${{ steps.tag.outputs.profile }}"
          if [ ! -d "projects/${PROFILE}" ]; then
            echo "ERROR: Profile directory projects/${PROFILE}/ not found" >&2
            exit 1
          fi
          if [ ! -f "projects/${PROFILE}/machine-profile.yaml" ]; then
            echo "ERROR: machine-profile.yaml not found in projects/${PROFILE}/" >&2
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Read component versions
        id: components
        run: |
          PROFILE="${{ steps.tag.outputs.profile }}"
          python3 - <<'EOF'
          import yaml, os, sys

          profile = os.environ.get("PROFILE", "${{ steps.tag.outputs.profile }}")
          mp_path = f"projects/{profile}/machine-profile.yaml"

          with open(mp_path) as f:
              mp = yaml.safe_load(f)

          components = mp.get("components")
          if not components:
              print(f"ERROR: No 'components:' block in {mp_path}", file=sys.stderr)
              sys.exit(1)

          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"runtime_repo={components['runtime']['repo']}\n")
              out.write(f"runtime_version={components['runtime']['version']}\n")
              for name, cfg in components.get("providers", {}).items():
                  out.write(f"provider_{name}_repo={cfg['repo']}\n")
                  out.write(f"provider_{name}_version={cfg['version']}\n")
          EOF

      - name: Download runtime binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ steps.components.outputs.runtime_repo }}"
          VERSION="${{ steps.components.outputs.runtime_version }}"
          ARCH="${{ matrix.arch }}"
          ASSET="anolis-${VERSION}-linux-${ARCH}.tar.gz"
          echo "Downloading ${ASSET} from ${REPO} v${VERSION}..."
          mkdir -p /tmp/downloads /tmp/runtime-extract staging/bin
          gh release download "v${VERSION}" \
            --repo "${REPO}" \
            --pattern "${ASSET}" \
            --dir /tmp/downloads
          tar -xzf "/tmp/downloads/${ASSET}" -C /tmp/runtime-extract
          cp /tmp/runtime-extract/bin/anolis-runtime staging/bin/

      - name: Download install.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ steps.components.outputs.runtime_repo }}"
          VERSION="${{ steps.components.outputs.runtime_version }}"
          gh release download "v${VERSION}" \
            --repo "${REPO}" \
            --pattern "install.sh" \
            --dir staging/
          chmod +x staging/install.sh

      - name: Download provider binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARCH="${{ matrix.arch }}"
          download_provider() {
            local name="$1" repo="$2" version="$3"
            local asset="anolis-provider-${name}-${version}-linux-${ARCH}.tar.gz"
            echo "Downloading ${asset} from ${repo} v${version}..."
            gh release download "v${version}" \
              --repo "${repo}" \
              --pattern "${asset}" \
              --dir /tmp/downloads
            mkdir -p "/tmp/provider-${name}-extract"
            tar -xzf "/tmp/downloads/${asset}" -C "/tmp/provider-${name}-extract"
            cp "/tmp/provider-${name}-extract/bin/anolis-provider-${name}" staging/bin/
          }

          download_provider "bread" \
            "${{ steps.components.outputs.provider_bread_repo }}" \
            "${{ steps.components.outputs.provider_bread_version }}"

          download_provider "ezo" \
            "${{ steps.components.outputs.provider_ezo_repo }}" \
            "${{ steps.components.outputs.provider_ezo_version }}"

      - name: Render production configs
        run: |
          PROFILE="${{ steps.tag.outputs.profile }}"
          python3 scripts/render-production-configs.py "${PROFILE}" staging

      - name: Copy systemd units
        run: mkdir -p staging/systemd && cp systemd/*.service staging/systemd/

      - name: Generate manifest
        run: |
          PROFILE="${{ steps.tag.outputs.profile }}"
          VERSION="${{ steps.tag.outputs.version }}"
          ARCH="${{ matrix.arch }}"
          jq -n \
            --argjson schema_version 1 \
            --arg profile "${PROFILE}" \
            --arg version "${VERSION}" \
            --arg arch "${ARCH}" \
            --arg runtime_version "${{ steps.components.outputs.runtime_version }}" \
            --arg provider_bread_version "${{ steps.components.outputs.provider_bread_version }}" \
            --arg provider_ezo_version "${{ steps.components.outputs.provider_ezo_version }}" \
            --arg git_sha "${{ github.sha }}" \
            --arg built_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg ci_run "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{
              schema_version: $schema_version,
              profile: $profile,
              version: $version,
              arch: $arch,
              components: {
                runtime: { version: $runtime_version },
                providers: {
                  bread: { version: $provider_bread_version },
                  ezo: { version: $provider_ezo_version }
                }
              },
              build: {
                git_sha: $git_sha,
                built_at: $built_at,
                ci_run: $ci_run
              }
            }' > staging/manifest.json

      - name: Generate bundle README
        run: |
          PROFILE="${{ steps.tag.outputs.profile }}"
          VERSION="${{ steps.tag.outputs.version }}"
          cat > staging/README.txt <<EOF
          Anolis Bundle: ${PROFILE} v${VERSION}
          ========================================

          Quick Install (offline)
          -----------------------
          From the directory containing this README:

              sudo ./install.sh --local .

          This installs all components to /opt/anolis and enables systemd
          services. After install, access the workbench UI at:

              http://$(hostname):3010

          Verify
          ------
              anolis-runtime --version
              systemctl status anolis-runtime

          More Info
          ---------
          See manifest.json for component versions and build metadata.
          Online docs: https://anolishq.github.io
          EOF
          # Strip leading whitespace from heredoc indentation
          sed -i 's/^          //' staging/README.txt

      - name: Generate checksums
        run: |
          cd staging
          find . -type f -not -name 'checksums.sha256' | sort | xargs sha256sum > checksums.sha256

      - name: Package bundle
        id: package
        run: |
          PROFILE="${{ steps.tag.outputs.profile }}"
          VERSION="${{ steps.tag.outputs.version }}"
          ARCH="${{ matrix.arch }}"
          BUNDLE_NAME="anolis-${PROFILE}-${VERSION}-${ARCH}"
          ARTIFACT="${BUNDLE_NAME}.tar.gz"
          mv staging "${BUNDLE_NAME}"
          tar -czf "${ARTIFACT}" "${BUNDLE_NAME}/"
          sha256sum "${ARTIFACT}" > "${ARTIFACT}.sha256"
          echo "artifact=${ARTIFACT}" >> "$GITHUB_OUTPUT"
          echo "bundle_name=${BUNDLE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          name: "${{ steps.tag.outputs.profile }} ${{ steps.tag.outputs.version }}"
          files: |
            ${{ steps.package.outputs.artifact }}
            ${{ steps.package.outputs.artifact }}.sha256
          body: |
            ## Bundle: ${{ steps.tag.outputs.profile }} v${{ steps.tag.outputs.version }} (${{ matrix.arch }})

            ### Components
            - **Runtime:** v${{ steps.components.outputs.runtime_version }}
            - **Provider Bread:** v${{ steps.components.outputs.provider_bread_version }}
            - **Provider EZO:** v${{ steps.components.outputs.provider_ezo_version }}

            ### Install
            ```bash
            # Online (from Pi with internet):
            curl -fsSL https://github.com/anolishq/anolis/releases/latest/download/install.sh | \
              sudo bash -s -- --profile ${{ steps.tag.outputs.profile }}

            # Offline (from this bundle):
            tar xzf ${{ steps.package.outputs.artifact }}
            cd ${{ steps.package.outputs.bundle_name }}
            sudo ./install.sh --local .
            ```
