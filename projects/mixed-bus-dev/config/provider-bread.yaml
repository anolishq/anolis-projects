provider:
  name: bread0

hardware:
  # bread 0.3.0 removed `require_live_session` and rejects it as an unknown key.
  # A real bus_path already carries the intent: the CRUMBS session must open or
  # startup throws.
  bus_path: /dev/i2c-1
  query_delay_us: 10000
  timeout_ms: 100
  retry_count: 2

discovery:
  mode: manual
  addresses: [0x0A, 0x14, 0x15]

devices:
  - id: rlht0
    type: rlht
    label: Reactor Left Heater
    address: 0x0A
  - id: dcmt0
    type: dcmt
    label: Reactor Feed Pumps
    address: 0x14
  - id: dcmt1
    type: dcmt
    label: Reactor Acid-Base Pumps
    address: 0x15
