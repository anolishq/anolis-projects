schema_version: 1
machine_id: bioreactor-v1
display_name: Bioreactor Lab Profile v1

runtime_profiles:
  manual: config/anolis-runtime.bioreactor.manual.yaml
  telemetry: config/anolis-runtime.bioreactor.telemetry.yaml
  automation: config/anolis-runtime.bioreactor.automation.yaml
  full: config/anolis-runtime.bioreactor.full.yaml

providers:
  bread0:
    config: config/provider-bread.bioreactor.yaml
    notes: "CRUMBS bus devices: rlht0 (0x0A), dcmt0 (0x14), dcmt1 (0x15)"
  ezo0:
    config: config/provider-ezo.bioreactor.yaml
    notes: "EZO sensors: ph0 (0x63), do0 (0x61)"

behaviors:
  - behaviors/bioreactor_stir_dual_dosing.xml

compatibility:
  runtime:
    config_contract: "01-runtime-config"
    http_contract: "02-runtime-http"
    notes: "Validated against anolis v0.1.5 contract gates."
  providers:
    bread0:
      strategy: local-build
      version: dev-linux-hardware-release
      notes: "Built from sibling anolis-provider-bread repo."
    ezo0:
      strategy: local-build
      version: dev-linux-hardware-release
      notes: "Built from sibling anolis-provider-ezo repo."
